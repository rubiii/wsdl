plugins:
  - rubocop-rake
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'pkg/**/*'

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: single_quotes

Style/BlockDelimiters:
  EnforcedStyle: semantic

Layout/LineLength:
  Max: 120

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

Metrics/ClassLength:
  Max: 200
  Exclude:
    - 'lib/wsdl/security/signature.rb'

Metrics/MethodLength:
  Max: 29

Metrics/AbcSize:
  Max: 19
  Exclude:
    - 'lib/wsdl/security/signature.rb'

Metrics/ParameterLists:
  Exclude:
    - 'lib/wsdl/security/signature.rb'

Layout/CaseIndentation:
  IndentOneStep: false
  EnforcedStyle: end

Layout/EndAlignment:
  EnforcedStyleAlignWith: variable

Layout/FirstHashElementIndentation:
  EnforcedStyle: consistent

Layout/FirstArrayElementIndentation:
  EnforcedStyle: consistent

Layout/MultilineHashBraceLayout:
  EnforcedStyle: new_line

Layout/MultilineArrayBraceLayout:
  EnforcedStyle: new_line

# RSpec cops configuration

RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/BeforeAfterAll:
  Exclude:
    - 'spec/integration/**/*'

RSpec/InstanceVariable:
  Exclude:
    - 'spec/integration/**/*'

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/NoExpectationExample:
  Enabled: false

RSpec/RepeatedDescription:
  Enabled: false

RSpec/IteratedExpectation:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

RSpec/StubbedMock:
  Enabled: false

RSpec/MessageSpies:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/MultipleDescribes:
  Enabled: false

RSpec/DescribeClass:
   Enabled: false

RSpec/ContextWording:
  Enabled: false

RSpec/NestedGroups:
  Max: 5
  Exclude:
    - 'spec/wsdl/security/**/*'

# Allow version numbers in symbol names for WS-Security algorithms
# (e.g., :exclusive_1_0, :inclusive_1_1)
Naming/VariableNumber:
  AllowedIdentifiers:
    - exclusive_1_0
    - exclusive_1_0_with_comments
    - inclusive_1_0
    - inclusive_1_0_with_comments
    - inclusive_1_1
    - inclusive_1_1_with_comments

# Allow helper methods that return boolean but aren't predicates
# (e.g., add_failure returns false after recording an error)
Naming/PredicateMethod:
  AllowedMethods:
    - add_failure
    - add_failure_nil
    - verify_signature!
    - parse_boolean
